<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dettaglio Prodotto | TechStore</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo"><h2><i class="fas fa-microchip"></i> TechStore</h2></div>
        <nav><ul><li><a href="index.html">Home</a></li><li><a href="catalogo.html">Catalogo</a></li></ul></nav>
        <div class="header-actions">
            <a href="carrello.html" class="cart-icon"><i class="fas fa-shopping-cart"></i><span id="cart-badge" class="badge">0</span></a>
        </div>
    </header>

    <div class="single-product-container">
        <div class="product-gallery">
            <img src="" class="main-img" alt="Immagine Prodotto">
        </div>
        <div class="product-details">
            <span class="category-tag">Categoria</span>
            <h1>Caricamento Prodotto...</h1>
            <div class="rating"></div>
            <p class="huge-price">€ 0,00</p>
            <p class="description">Descrizione del prodotto.</p>
            
            <div class="purchase-actions">
                <input type="number" value="1" min="1" class="qty-input">
                <button class="btn-primary add-to-cart-large">
                    <i class="fas fa-cart-plus"></i> Aggiungi al Carrello
                </button>
            </div>
            
            <div class="delivery-info">
                <p><i class="fas fa-truck"></i> Spedizione Gratuita in 24/48 ore</p>
                <p><i class="fas fa-shield-alt"></i> Garanzia Ufficiale 24 Mesi</p>
            </div>
        </div>
    </div>

    <footer><div class="footer-bottom"><p>© 2026 TechStore.</p></div></footer>
    <script src="script.js"></script>
</body>
</html>
